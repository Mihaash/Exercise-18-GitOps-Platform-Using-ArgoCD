apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/example/exercise18.git'
    targetRevision: HEAD
    path: gitops/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
